<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WarEra Pulse — Economy (mockup)</title>
<style>
  :root{
    --bg:#070a0f;--panel:#0b0f17;--panel2:#0d121c;--card:#0e141f;--line:#1a2230;
    --txt:#c8d2e0;--dim:#6b7888;--faint:#3d4757;
    --up:#3fb950;--down:#f85149;--amber:#d29922;--cyan:#39c0d3;--accent:#3fb950;
    --mono:ui-monospace,"Cascadia Mono",Menlo,monospace;--sans:"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:13px;height:100vh;overflow:hidden}
  .wrap{max-width:1920px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
  .hdr{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);background:var(--panel);padding:10px 16px}
  .logo{font-weight:800;letter-spacing:.1em}.logo b{color:var(--accent)}
  .nav{display:flex;gap:8px;margin-left:8px}
  .nav a{font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:6px 12px;border:1px solid var(--line);border-radius:4px;color:var(--dim);text-decoration:none}
  .nav a.on{color:var(--accent);border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.1)}
  .styleswitch{margin-left:auto;display:flex;gap:6px;align-items:center}
  .styleswitch .lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .sbtn{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 11px;border:1px solid var(--line);border-radius:4px;color:var(--dim);cursor:pointer;background:none}
  .sbtn.on{color:var(--accent);border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.1)}

  .grid{flex:1;display:grid;grid-template-columns:1.1fr .9fr;gap:1px;background:var(--line);min-height:0}
  .mod{background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .mhead{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);padding:9px 14px;flex-shrink:0}
  .mhead .t{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
  .mhead .m{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}
  .toggle{display:flex;gap:6px;margin-left:auto}
  .chip{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border:1px solid var(--line);border-radius:3px;color:var(--dim);cursor:pointer}
  .chip.on{color:var(--accent);border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.1)}
  .nctrl{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);padding:8px 12px;flex-shrink:0}
  .nctrl input{flex:0 0 150px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:11px;padding:6px 9px;border-radius:3px}
  .body{flex:1;overflow-y:auto;padding:10px}
  .ico{display:inline-grid;place-items:center;background:#10161f;border:1px solid var(--line);border-radius:4px}

  /* ============ STYLE: BARS ============ */
  .bars .row{position:relative;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:5px;margin-bottom:5px;background:var(--card);border:1px solid var(--line);overflow:hidden}
  .bars .bar{position:absolute;left:0;top:0;bottom:0;z-index:0;border-right:1px solid rgba(63,185,80,.35)}
  .bars .row>*{position:relative;z-index:1}
  .bars .rk{width:16px;font-family:var(--mono);font-size:11px;color:var(--faint);text-align:right}
  .bars .ic{width:24px;height:24px;font-size:14px}
  .bars .nm{font-weight:700;font-size:12.5px;white-space:nowrap}
  .bars .sub{font-size:10px;color:var(--dim);font-family:var(--mono)}
  .bars .val{margin-left:auto;text-align:right;white-space:nowrap}
  .bars .val .v{font-family:var(--mono);font-size:16px;font-weight:800;color:var(--up);line-height:1}
  .bars .val .k{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint)}

  /* ============ STYLE: HEAT ============ */
  .heat .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start}
  .heat .c{position:relative;border:1px solid var(--line);border-radius:6px;padding:10px 12px;overflow:hidden}
  .heat .c .top{display:flex;align-items:center;gap:8px}
  .heat .ic{width:26px;height:26px;font-size:16px}
  .heat .nm{font-weight:700;font-size:13px}
  .heat .big{margin-left:auto;font-family:var(--mono);font-size:19px;font-weight:800;color:var(--up);line-height:1}
  .heat .meta{margin-top:7px;font-size:10.5px;color:var(--dim);font-family:var(--mono);display:flex;gap:10px}
  .heat .meta b{color:var(--txt)}
  .heat .badge{position:absolute;top:7px;right:10px;font-size:8px;font-weight:800;letter-spacing:.1em;color:#04130a;background:var(--accent);padding:2px 5px;border-radius:2px}
  .heat .c.lead{border-color:rgba(63,185,80,.5);box-shadow:0 0 0 1px rgba(63,185,80,.25),0 0 22px rgba(63,185,80,.12)}

  /* ============ STYLE: CARDS ============ */
  .cards .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start}
  .cards .c{background:var(--card);border:1px solid var(--line);border-radius:5px;padding:9px 11px}
  .cards .top{display:flex;align-items:center;gap:8px}
  .cards .ic{width:26px;height:26px;font-size:16px}
  .cards .nm{font-weight:700;font-size:13px}
  .cards .big{margin-left:auto;text-align:right}
  .cards .big .v{font-family:var(--mono);font-size:18px;font-weight:800;color:var(--up);line-height:1}
  .cards .big .k{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint)}
  .cards .recipe{margin-top:7px;font-size:11px;color:var(--dim)}
  .cards .stats{margin-top:7px;display:flex;gap:12px;font-family:var(--mono);font-size:10.5px;border-top:1px solid var(--line);padding-top:6px}
  .cards .stats .k{font-family:var(--sans);font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);display:block}
  .cards .stats b{color:var(--up)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <span class="logo">WAR<b>ERA</b> PULSE</span>
    <nav class="nav"><a href="#">Markets</a><a href="#" class="on">Economy</a><a href="#">Citizen</a></nav>
    <div class="styleswitch">
      <span class="lbl">Style</span>
      <button class="sbtn on" data-s="bars">Bars</button>
      <button class="sbtn" data-s="heat">Heat</button>
      <button class="sbtn" data-s="cards">Cards</button>
    </div>
  </div>

  <div class="grid" id="grid">
    <section class="mod">
      <div class="mhead"><span class="t">Refining Margins</span>
        <div class="toggle"><span class="chip on">Buy</span><span class="chip">Full chain</span></div>
      </div>
      <div class="body" id="rbody"></div>
    </section>
    <section class="mod">
      <div class="mhead"><span class="t">Nations Economy</span><span class="m">180 countries</span></div>
      <div class="nctrl"><input placeholder="Search country…" />
        <div class="toggle" style="margin-left:auto"><span class="chip on">Bonus</span><span class="chip">Dev</span><span class="chip">Tax</span></div>
      </div>
      <div class="body" id="nbody"></div>
    </section>
  </div>
</div>

<script>
  const EMO={oil:"🛢️",concrete:"🧱",steel:"⚙️",bread:"🍞",steak:"🥩",cookedFish:"🍣",lightAmmo:"•",ammo:"🔫",heavyAmmo:"💣",cocain:"❄️",coca:"🍃",grain:"🌾",livestock:"🐄",fish:"🐟",lead:"◼️",iron:"⛓️",limestone:"🪨",petroleum:"🛢️"};
  const NAME={oil:"Oil",concrete:"Concrete",steel:"Steel",bread:"Bread",steak:"Steak",cookedFish:"Cooked Fish",lightAmmo:"Light Ammo",ammo:"Ammo",heavyAmmo:"Heavy Ammo",cocain:"Cocaine",coca:"Coca",grain:"Grain",livestock:"Livestock",fish:"Fish",lead:"Lead",iron:"Iron",limestone:"Limestone",petroleum:"Petroleum"};
  const R=[
    {c:"cocain",inp:["coca",200],pts:200,cost:16.03,sell:37.08,margin:21.05,pt:.1052,pct:131.3},
    {c:"bread",inp:["grain",10],pts:10,cost:.79,sell:1.835,margin:1.045,pt:.1045,pct:132.2},
    {c:"steak",inp:["livestock",1],pts:20,cost:1.596,sell:3.646,margin:2.05,pt:.1025,pct:128.4},
    {c:"cookedFish",inp:["fish",1],pts:40,cost:3.359,sell:7.336,margin:3.978,pt:.0994,pct:118.4},
    {c:"oil",inp:["petroleum",1],pts:1,cost:.0853,sell:.1786,margin:.0932,pt:.0932,pct:109.3},
    {c:"lightAmmo",inp:["lead",1],pts:1,cost:.0807,sell:.1706,margin:.0898,pt:.0898,pct:111.2},
    {c:"ammo",inp:["lead",4],pts:4,cost:.323,sell:.6673,margin:.3443,pt:.0861,pct:106.6},
    {c:"concrete",inp:["limestone",10],pts:10,cost:.7957,sell:1.637,margin:.8409,pt:.0841,pct:105.7},
    {c:"steel",inp:["iron",10],pts:10,cost:.8307,sell:1.603,margin:.7723,pt:.0772,pct:93.0},
    {c:"heavyAmmo",inp:["lead",16],pts:16,cost:1.292,sell:2.452,margin:1.16,pt:.0725,pct:89.8},
  ];
  const N=[
    {f:"🇿🇦",n:"South Africa",s:"steel",b:34.8,tax:12,dev:195},{f:"🇪🇬",n:"Egypt",s:"iron",b:32.3,tax:1,dev:430},
    {f:"🇮🇶",n:"Iraq",s:"limestone",b:31.5,tax:10,dev:144},{f:"🇮🇹",n:"Italy",s:"lead",b:30.5,tax:7,dev:339},
    {f:"🇮🇳",n:"India",s:"cookedFish",b:30.5,tax:7.5,dev:170},{f:"🇭🇷",n:"Croatia",s:"steak",b:26,tax:9,dev:225},
    {f:"🇵🇱",n:"Poland",s:"concrete",b:20.5,tax:12,dev:126},{f:"🇩🇪",n:"Germany",s:"bread",b:18.2,tax:8,dev:210},
    {f:"🇫🇷",n:"France",s:"ammo",b:16.4,tax:6,dev:188},{f:"🇧🇷",n:"Brazil",s:"coca",b:14.1,tax:5,dev:99},
    {f:"🇪🇸",n:"Spain",s:"oil",b:12.7,tax:10,dev:142},{f:"🇹🇷",n:"Turkey",s:"grain",b:11.9,tax:4,dev:88},
  ];
  // normalize a value within [min,max] to a 18..100 width so ranking is visible
  const norm=(v,min,max)=>18+((v-min)/((max-min)||1))*82;
  const heat=(v,min,max)=>((v-min)/((max-min)||1)); // 0..1

  function render(style){
    const rMax=Math.max(...R.map(x=>x.pt)),rMin=Math.min(...R.map(x=>x.pt));
    const nMax=Math.max(...N.map(x=>x.b)),nMin=Math.min(...N.map(x=>x.b));
    const grid=document.getElementById('grid');
    grid.className='grid '+style;
    const rb=document.getElementById('rbody'),nb=document.getElementById('nbody');

    if(style==='bars'){
      rb.innerHTML=R.map((r,i)=>`<div class="row"><div class="bar" style="width:${norm(r.pt,rMin,rMax)}%;background:linear-gradient(90deg,rgba(63,185,80,.18),rgba(63,185,80,.04))"></div>
        <span class="rk">${i+1}</span><span class="ico ic">${EMO[r.c]}</span>
        <span><div class="nm">${NAME[r.c]}</div><div class="sub">${r.inp[1]}× ${EMO[r.inp[0]]} · ${r.pts}pts · +${r.pct}%</div></span>
        <span class="val"><div class="v">${r.pt.toFixed(4)}</div><div class="k">margin/pt</div></span></div>`).join('');
      nb.innerHTML=N.map((c,i)=>`<div class="row"><div class="bar" style="width:${norm(c.b,nMin,nMax)}%;background:linear-gradient(90deg,rgba(57,192,211,.16),rgba(57,192,211,.03))"></div>
        <span class="rk">${i+1}</span><span class="ico ic" style="font-size:13px">${c.f}</span>
        <span><div class="nm">${c.n}</div><div class="sub">${EMO[c.s]} ${NAME[c.s]} · tax ${c.tax}% · dev ${c.dev}</div></span>
        <span class="val"><div class="v">+${c.b}%</div><div class="k">prod bonus</div></span></div>`).join('');
    }
    else if(style==='heat'){
      rb.innerHTML='<div class="grid2">'+R.map((r,i)=>{const h=heat(r.pt,rMin,rMax);return `<div class="c ${i===0?'lead':''}" style="background:rgba(63,185,80,${(.03+h*.13).toFixed(3)})">${i===0?'<span class="badge">Top</span>':''}
        <div class="top"><span class="ico ic">${EMO[r.c]}</span><span class="nm">${NAME[r.c]}</span><span class="big">${r.pt.toFixed(4)}</span></div>
        <div class="meta"><span>${r.inp[1]}× ${EMO[r.inp[0]]}</span><span><b>${r.pts}</b>pts</span><span>sell <b>${r.sell}</b></span><span style="color:var(--up)">+${r.pct}%</span></div></div>`;}).join('')+'</div>';
      nb.innerHTML='<div class="grid2">'+N.map((c,i)=>{const h=heat(c.b,nMin,nMax);return `<div class="c ${i===0?'lead':''}" style="background:rgba(57,192,211,${(.03+h*.13).toFixed(3)})">${i===0?'<span class="badge">Top</span>':''}
        <div class="top"><span class="ico ic" style="font-size:13px">${c.f}</span><span class="nm">${c.n}</span><span class="big" style="color:var(--cyan)">+${c.b}%</span></div>
        <div class="meta"><span>${EMO[c.s]} ${NAME[c.s]}</span><span>tax <b>${c.tax}%</b></span><span>dev <b>${c.dev}</b></span></div></div>`;}).join('')+'</div>';
    }
    else{ // cards
      rb.innerHTML='<div class="grid2">'+R.map(r=>`<div class="c"><div class="top"><span class="ico ic">${EMO[r.c]}</span><span class="nm">${NAME[r.c]}</span><span class="big"><div class="v">${r.pt.toFixed(4)}</div><div class="k">margin/pt</div></span></div>
        <div class="recipe">${r.inp[1]}× ${EMO[r.inp[0]]} ${NAME[r.inp[0]]} → ${EMO[r.c]} · ${r.pts} pts</div>
        <div class="stats"><span><span class="k">Sell</span><b style="color:var(--txt)">${r.sell}</b></span><span><span class="k">Margin</span><b>+${r.margin}</b></span><span><span class="k">Return</span><b>+${r.pct}%</b></span></div></div>`).join('')+'</div>';
      nb.innerHTML='<div class="grid2">'+N.map(c=>`<div class="c"><div class="top"><span class="ico ic" style="font-size:13px">${c.f}</span><span class="nm">${c.n}</span><span class="big"><div class="v" style="color:var(--cyan)">+${c.b}%</div><div class="k">bonus</div></span></div>
        <div class="recipe">${EMO[c.s]} ${NAME[c.s]}</div>
        <div class="stats"><span><span class="k">Income tax</span><b style="color:var(--txt)">${c.tax}%</b></span><span><span class="k">Dev</span><b style="color:var(--txt)">${c.dev}</b></span></div></div>`).join('')+'</div>';
    }
  }
  document.querySelectorAll('.sbtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.sbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');render(b.dataset.s);});
  render('bars');
</script>
</body>
</html>
