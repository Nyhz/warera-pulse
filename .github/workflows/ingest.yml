name: Ingest prices

# Persists a price snapshot for the 21 resources every ~15 min.
# (Vercel Hobby cron only runs daily, so we schedule from GitHub Actions.)
# GitHub may delay scheduled runs under load — that's fine for hourly charts.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   INGEST_URL    e.g. https://your-app.vercel.app/api/ingest
#   INGEST_SECRET same value as the Vercel env var INGEST_SECRET

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/ingest
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          curl -fsS -X POST "$INGEST_URL" \
            -H "Authorization: Bearer $INGEST_SECRET" \
            --max-time 30
